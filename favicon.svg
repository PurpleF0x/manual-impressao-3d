<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Borda accent -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Texto 3D -->
  <text x="32" y="26" text-anchor="middle" font-family="'Arial Black',sans-serif" font-weight="900" font-size="18" fill="#00e5ff" letter-spacing="-1">3D</text>
  <!-- Linha separadora -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Texto manual -->
  <text x="32" y="46" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="9" fill="#888899" letter-spacing="2">MANUAL</text>
</svg>
