<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050f0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  <!-- Fundo -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>
  <!-- Borda accent -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Ícone -->
  <text x="32" y="38" text-anchor="middle" font-size="28" dominant-baseline="middle">✉️</text>
  
</svg>